; =============================
; FreePBX Custom Dialplan
; =============================

; --- CHANGE THIS NUMBER to your preferred SAME menu extension ---
[from-internal-custom]
exten => 7788,1,NoOp(SAME menu)
 same => n,Gosub(app-same-menu,s,1)
 same => n,Hangup()

; --- Subscription menu logic ---
[app-same-menu]
exten => s,1,Answer()

 ; Main menu: press 1 add by ZIP, 2 remove, 3 list
 same => n(menu),Read(SEL,custom/same-main-menu,1,,3,10)
 same => n,GotoIf($["${SEL}"="1"]?zip)
 same => n,GotoIf($["${SEL}"="2"]?del)
 same => n,GotoIf($["${SEL}"="3"]?list)
 same => n,Playback(option-is-invalid)
 same => n,Goto(menu)

 ; Remove flow (interactive pick-list in AGI)
 same => n(del),AGI(same_subs.py,mode=remove_flow,ext=${CALLERID(num)})
 same => n,Goto(menu)

 ; List codes (spoken as county/state)
 same => n(list),AGI(same_subs.py,mode=list,ext=${CALLERID(num)})
 same => n,Goto(menu)

 ; ZIP lookup and add flow (interactive in AGI)
 same => n(zip),AGI(same_subs.py,mode=zip_flow,ext=${CALLERID(num)})
 same => n,Goto(menu)

; --- Alert playback context (called by poller via 'channel originate ... extension') ---
; The extension name IS the Playback path (e.g. custom/nws_047001_abc123).
[app-nws-alert-play]
exten => _.,1,NoOp(NWS alert playback: ${EXTEN})
 same => n,Playback(${EXTEN})
 same => n,Hangup()


